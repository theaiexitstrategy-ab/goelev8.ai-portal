<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>The Flex Facility — Bookings</title>
<link rel="icon" href="/icon-192.png" />
<link rel="stylesheet" href="./portal.css?v=1" />
</head>
<body>
<button id="menu-toggle">&#9776;</button>
<div class="portal">
  <div id="sidebar"></div>
  <div class="main">
    <div class="topbar">
      <div>
        <h1>BOOKINGS</h1>
        <div class="sub">Manage your calendar, availability, and services</div>
      </div>
    </div>

    <!-- Booking link widget -->
    <div id="link-widget-slot">
      <div class="skeleton" style="height:86px;border-radius:12px;margin-bottom:20px"></div>
    </div>

    <!-- Sub-tab switcher -->
    <div class="subtabs" id="subtabs">
      <button class="subtab active" data-sub="appointments" onclick="setSubTab('appointments')">Appointments</button>
      <button class="subtab" data-sub="availability" onclick="setSubTab('availability')">Availability</button>
      <button class="subtab" data-sub="services" onclick="setSubTab('services')">Services</button>
    </div>

    <!-- Appointments section -->
    <section id="sub-appointments" class="subsection">
      <div class="filter-pills">
        <button class="pill active" data-filter="upcoming" onclick="setApptFilter('upcoming')">Upcoming</button>
        <button class="pill" data-filter="all" onclick="setApptFilter('all')">All</button>
        <button class="pill" data-filter="past" onclick="setApptFilter('past')">Past</button>
        <button class="pill" data-filter="cancelled" onclick="setApptFilter('cancelled')">Cancelled</button>
      </div>
      <div id="appt-list">
        <div class="skeleton" style="height:200px;border-radius:12px"></div>
      </div>
    </section>

    <!-- Availability section -->
    <section id="sub-availability" class="subsection" style="display:none">
      <div class="panel">
        <h2>Weekly Availability <span id="avail-tz" style="font-size:0.7rem;color:var(--muted);font-weight:400;margin-left:8px"></span></h2>
        <div id="avail-grid">
          <div class="skeleton" style="height:240px;border-radius:8px"></div>
        </div>
        <div style="margin-top:16px;display:flex;justify-content:flex-end">
          <button class="btn btn-primary" onclick="saveAvailability()">Save All</button>
        </div>
      </div>
    </section>

    <!-- Services section -->
    <section id="sub-services" class="subsection" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div style="font-size:0.85rem;color:var(--muted)">Services leads can book on your page</div>
        <button class="btn btn-primary btn-sm" onclick="openServiceModal()">+ Add Service</button>
      </div>
      <div id="svc-list">
        <div class="skeleton" style="height:160px;border-radius:12px"></div>
      </div>
    </section>
  </div>
</div>

<!-- Service edit/create modal -->
<div id="svc-modal" class="modal-bg" style="display:none" onclick="if(event.target===this)closeServiceModal()">
  <div class="modal">
    <h2 id="svc-modal-title">Add Service</h2>
    <div class="form-group">
      <label>Name</label>
      <input type="text" id="svc-name" placeholder="e.g. 30-min Personal Training" />
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="svc-description" rows="2" placeholder="Short description shown to leads"></textarea>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group">
        <label>Duration (min)</label>
        <input type="number" id="svc-duration" min="5" step="5" value="30" />
      </div>
      <div class="form-group">
        <label>Price (USD)</label>
        <input type="number" id="svc-price" min="0" step="1" value="0" />
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeServiceModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveService()">Save</button>
    </div>
  </div>
</div>

<script src="./shell.js?v=1"></script>
<script>
initShell('bookings');

// ===== Module state =====
var calendar = null;
var activeSub = 'appointments';
var apptFilter = 'upcoming';
var appts = [];
var avail = [];
var services = [];
var editingServiceId = null;

var DAYS = [
  { dow: 1, label: 'Monday'    },
  { dow: 2, label: 'Tuesday'   },
  { dow: 3, label: 'Wednesday' },
  { dow: 4, label: 'Thursday'  },
  { dow: 5, label: 'Friday'    },
  { dow: 6, label: 'Saturday'  },
  { dow: 0, label: 'Sunday'    }
];

// ===== Boot =====
(async function boot() {
  try {
    var resp = await api('/api/portal/bookings/calendar');
    calendar = resp.calendar;
  } catch (e) {
    renderNoCalendar(e.message);
    return;
  }
  if (!calendar) {
    renderNoCalendar('no_calendar');
    return;
  }
  renderLinkWidget();
  loadAppointments();
})();

function renderNoCalendar(reason) {
  document.getElementById('link-widget-slot').innerHTML = '';
  document.getElementById('subtabs').style.display = 'none';
  document.querySelectorAll('.subsection').forEach(function(el) { el.style.display = 'none'; });
  var main = document.querySelector('.main');
  var box = document.createElement('div');
  box.className = 'panel';
  box.innerHTML =
    '<h2>Booking calendar not configured</h2>' +
    '<div style="color:var(--muted);font-size:0.85rem;line-height:1.5">' +
      'Your client account doesn\'t have a booking calendar yet. ' +
      'Contact support to get set up.' +
    '</div>';
  main.appendChild(box);
}

// ===== Booking link widget =====
function bookingUrl() {
  if (calendar.custom_domain) return calendar.custom_domain;
  return 'book.goelev8.ai/' + calendar.slug;
}
function bookingFullUrl() {
  var u = bookingUrl();
  return u.indexOf('http') === 0 ? u : 'https://' + u;
}
function renderLinkWidget() {
  var slot = document.getElementById('link-widget-slot');
  slot.innerHTML =
    '<div class="link-widget">' +
      '<div class="link-widget-label">Your Booking Link</div>' +
      '<div class="link-widget-row">' +
        '<div class="link-widget-url">' + bookingUrl() + '</div>' +
        '<div class="link-widget-actions">' +
          '<button class="btn btn-primary btn-sm" onclick="copyBookingLink(this)">Copy Link</button>' +
          '<button class="btn btn-ghost btn-sm" onclick="openBookingLink()">Open in New Tab</button>' +
        '</div>' +
      '</div>' +
    '</div>';
}
function copyBookingLink(btn) {
  var url = bookingFullUrl();
  navigator.clipboard.writeText(url).then(function() {
    var orig = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(function() { btn.textContent = orig; }, 1500);
  }).catch(function() {
    toast('Copy failed', true);
  });
}
function openBookingLink() {
  window.open(bookingFullUrl(), '_blank', 'noopener');
}

// ===== Sub-tabs =====
function setSubTab(name) {
  activeSub = name;
  document.querySelectorAll('.subtab').forEach(function(b) {
    b.classList.toggle('active', b.getAttribute('data-sub') === name);
  });
  document.getElementById('sub-appointments').style.display = name === 'appointments' ? '' : 'none';
  document.getElementById('sub-availability').style.display = name === 'availability' ? '' : 'none';
  document.getElementById('sub-services').style.display     = name === 'services'     ? '' : 'none';
  if (name === 'availability' && !avail.length) loadAvailability();
  if (name === 'services'     && !services.length) loadServices();
}

// ===== Appointments =====
function setApptFilter(f) {
  apptFilter = f;
  document.querySelectorAll('#sub-appointments .pill').forEach(function(p) {
    p.classList.toggle('active', p.getAttribute('data-filter') === f);
  });
  loadAppointments();
}
async function loadAppointments() {
  var list = document.getElementById('appt-list');
  list.innerHTML = '<div class="skeleton" style="height:200px;border-radius:12px"></div>';
  try {
    var resp = await api('/api/portal/bookings/appointments?filter=' + encodeURIComponent(apptFilter));
    appts = resp.appointments || [];
    renderAppointments();
  } catch (e) {
    list.innerHTML = '<div class="empty">Failed to load appointments.</div>';
  }
}
function renderAppointments() {
  var list = document.getElementById('appt-list');
  if (!appts.length) {
    list.innerHTML =
      '<div class="empty">' +
        '<div style="font-size:2rem;margin-bottom:8px">📅</div>' +
        '<div style="font-weight:600;color:var(--text);margin-bottom:4px">No appointments yet.</div>' +
        '<div>Share your booking link to get started.</div>' +
      '</div>';
    return;
  }
  list.innerHTML = appts.map(function(a) {
    var badgeCls = 'status-badge status-' + (a.status || 'pending');
    var name = escapeHtml(a.lead_name || 'Unknown');
    var phone = a.lead_phone ? ' · ' + escapeHtml(a.lead_phone) : '';
    var svc = a.service_name ? escapeHtml(a.service_name) : '—';
    var actions = renderApptActions(a);
    return '<div class="appt-row">' +
      '<div class="appt-left">' +
        '<div class="appt-name">' + name + phone + '</div>' +
        '<div class="appt-meta">' + svc + '</div>' +
      '</div>' +
      '<div class="appt-right">' +
        '<div class="appt-when">' + formatDateTime(a.appointment_start) + '</div>' +
        '<span class="' + badgeCls + '">' + (a.status || 'pending').replace('_',' ') + '</span>' +
        '<div class="appt-actions">' + actions + '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}
function renderApptActions(a) {
  // Only show actions that make sense for the current status.
  var buttons = [];
  if (a.status !== 'confirmed' && a.status !== 'cancelled') {
    buttons.push('<button class="btn btn-primary btn-sm" onclick="updateApptStatus(\''+a.id+'\',\'confirmed\')">Confirm</button>');
  }
  if (a.status !== 'cancelled') {
    buttons.push('<button class="btn btn-ghost btn-sm" onclick="updateApptStatus(\''+a.id+'\',\'cancelled\')">Cancel</button>');
  }
  if (a.status !== 'no_show' && a.status !== 'cancelled') {
    buttons.push('<button class="btn btn-ghost btn-sm" onclick="updateApptStatus(\''+a.id+'\',\'no_show\')">No-Show</button>');
  }
  return buttons.join('');
}
async function updateApptStatus(id, status) {
  try {
    await api('/api/portal/bookings/appointments', {
      method: 'PATCH',
      body: { id: id, status: status }
    });
    toast('Updated');
    loadAppointments();
  } catch (e) {
    toast(e.message, true);
  }
}

// ===== Availability =====
async function loadAvailability() {
  var grid = document.getElementById('avail-grid');
  grid.innerHTML = '<div class="skeleton" style="height:240px;border-radius:8px"></div>';
  try {
    var resp = await api('/api/portal/bookings/availability');
    avail = resp.availability || [];
    if (resp.timezone) {
      document.getElementById('avail-tz').textContent = '(' + resp.timezone + ')';
    }
    renderAvailability();
  } catch (e) {
    grid.innerHTML = '<div class="empty">Failed to load availability.</div>';
  }
}
function renderAvailability() {
  var byDow = {};
  avail.forEach(function(a) { byDow[a.day_of_week] = a; });
  var grid = document.getElementById('avail-grid');
  grid.innerHTML = DAYS.map(function(d) {
    var row = byDow[d.dow];
    var active = row ? !!row.is_active : false;
    var start  = (row && row.start_time) ? row.start_time.slice(0,5) : '09:00';
    var end    = (row && row.end_time)   ? row.end_time.slice(0,5)   : '17:00';
    var disabled = active ? '' : 'disabled';
    return '<div class="avail-row" data-dow="'+d.dow+'">' +
      '<div class="avail-day">' + d.label + '</div>' +
      '<label class="switch">' +
        '<input type="checkbox" ' + (active?'checked':'') + ' onchange="toggleDay('+d.dow+',this.checked)" />' +
        '<span class="slider"></span>' +
      '</label>' +
      '<input type="time" class="avail-start" value="'+start+'" ' + disabled + ' />' +
      '<input type="time" class="avail-end"   value="'+end+'" '   + disabled + ' />' +
    '</div>';
  }).join('');
}
function toggleDay(dow, active) {
  var row = document.querySelector('.avail-row[data-dow="'+dow+'"]');
  if (!row) return;
  row.querySelector('.avail-start').disabled = !active;
  row.querySelector('.avail-end').disabled   = !active;
}
async function saveAvailability() {
  var days = [];
  document.querySelectorAll('.avail-row').forEach(function(row) {
    var dow = parseInt(row.getAttribute('data-dow'), 10);
    var active = row.querySelector('input[type="checkbox"]').checked;
    var start = row.querySelector('.avail-start').value;
    var end   = row.querySelector('.avail-end').value;
    // Only send active days; deactivated days get their row dropped from the
    // set we send. If the row existed previously with is_active=true we keep
    // it in the payload with is_active=false so the DB reflects the toggle.
    days.push({
      day_of_week: dow,
      start_time: start,
      end_time: end,
      is_active: active
    });
  });
  // Filter out inactive days that also have end <= start, which would fail
  // the CHECK constraint. For inactive days we send a sentinel window so
  // the DB stores something valid.
  var payload = days.map(function(d) {
    if (!d.is_active && (!d.end_time || d.end_time <= d.start_time)) {
      return Object.assign({}, d, { start_time: '09:00', end_time: '17:00' });
    }
    return d;
  });
  try {
    var resp = await api('/api/portal/bookings/availability', {
      method: 'PUT',
      body: { days: payload }
    });
    avail = resp.availability || [];
    renderAvailability();
    toast('Availability saved');
  } catch (e) {
    toast(e.message, true);
  }
}

// ===== Services =====
async function loadServices() {
  var list = document.getElementById('svc-list');
  list.innerHTML = '<div class="skeleton" style="height:160px;border-radius:12px"></div>';
  try {
    var resp = await api('/api/portal/bookings/services');
    services = resp.services || [];
    renderServices();
  } catch (e) {
    list.innerHTML = '<div class="empty">Failed to load services.</div>';
  }
}
function renderServices() {
  var list = document.getElementById('svc-list');
  if (!services.length) {
    list.innerHTML = '<div class="empty">No services yet. Click "+ Add Service" to create one.</div>';
    return;
  }
  list.innerHTML = services.map(function(s) {
    var cls = 'svc-row' + (s.is_active ? '' : ' inactive');
    var price = '$' + ((s.price_cents || 0) / 100).toFixed(2);
    return '<div class="'+cls+'">' +
      '<div class="svc-info" onclick="editService(\''+s.id+'\')" style="cursor:pointer">' +
        '<div class="svc-name">' + escapeHtml(s.name) + '</div>' +
        '<div class="svc-meta">' + (s.duration_minutes || 0) + ' min · ' + price + (s.description ? ' · ' + escapeHtml(s.description) : '') + '</div>' +
      '</div>' +
      '<div class="svc-actions">' +
        '<label class="switch" title="Active">' +
          '<input type="checkbox" ' + (s.is_active?'checked':'') + ' onchange="toggleService(\''+s.id+'\',this.checked)" />' +
          '<span class="slider"></span>' +
        '</label>' +
        '<button class="btn btn-ghost btn-sm" onclick="editService(\''+s.id+'\')">Edit</button>' +
      '</div>' +
    '</div>';
  }).join('');
}
function openServiceModal() {
  editingServiceId = null;
  document.getElementById('svc-modal-title').textContent = 'Add Service';
  document.getElementById('svc-name').value = '';
  document.getElementById('svc-description').value = '';
  document.getElementById('svc-duration').value = 30;
  document.getElementById('svc-price').value = 0;
  document.getElementById('svc-modal').style.display = 'flex';
}
function editService(id) {
  var s = services.find(function(x) { return x.id === id; });
  if (!s) return;
  editingServiceId = id;
  document.getElementById('svc-modal-title').textContent = 'Edit Service';
  document.getElementById('svc-name').value = s.name || '';
  document.getElementById('svc-description').value = s.description || '';
  document.getElementById('svc-duration').value = s.duration_minutes || 30;
  document.getElementById('svc-price').value = ((s.price_cents || 0) / 100).toFixed(2);
  document.getElementById('svc-modal').style.display = 'flex';
}
function closeServiceModal() {
  document.getElementById('svc-modal').style.display = 'none';
  editingServiceId = null;
}
async function saveService() {
  var name = document.getElementById('svc-name').value.trim();
  if (!name) { toast('Name required', true); return; }
  var description = document.getElementById('svc-description').value.trim();
  var duration_minutes = parseInt(document.getElementById('svc-duration').value, 10) || 30;
  var priceDollars = parseFloat(document.getElementById('svc-price').value) || 0;
  var price_cents = Math.round(priceDollars * 100);

  try {
    if (editingServiceId) {
      await api('/api/portal/bookings/services', {
        method: 'PATCH',
        body: { id: editingServiceId, name: name, description: description, duration_minutes: duration_minutes, price_cents: price_cents }
      });
      toast('Service updated');
    } else {
      await api('/api/portal/bookings/services', {
        method: 'POST',
        body: { name: name, description: description, duration_minutes: duration_minutes, price_cents: price_cents }
      });
      toast('Service added');
    }
    closeServiceModal();
    loadServices();
  } catch (e) {
    toast(e.message, true);
  }
}
async function toggleService(id, active) {
  try {
    await api('/api/portal/bookings/services', {
      method: 'PATCH',
      body: { id: id, is_active: active }
    });
    // Update local state without a full reload.
    var s = services.find(function(x) { return x.id === id; });
    if (s) s.is_active = active;
    renderServices();
  } catch (e) {
    toast(e.message, true);
    loadServices();
  }
}

// ===== Utils =====
function escapeHtml(s) {
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
</script>
</body>
</html>
