<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>The Flex Facility — Login</title>
<link rel="icon" href="/icon-192.png" />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --accent: #00CFFF;
  --accent-light: #66E2FF;
  --bg: #0a0e1a;
  --card: #111827;
  --border: #1f2937;
  --text: #f3f4f6;
  --muted: #9ca3af;
  --error: #ef4444;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Outfit',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:16px; }
.login-box { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:36px 32px; width:100%; max-width:400px; }
.brand { text-align:center; margin-bottom:24px; }
.brand h1 { font-family:'Bebas Neue', sans-serif; font-size:1.75rem; letter-spacing:1px; color:var(--accent); margin-bottom:4px; }
.brand p { color:var(--muted); font-size:0.85rem; }
.field { margin-bottom:14px; }
.field label { display:block; font-size:0.72rem; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; color:var(--muted); margin-bottom:6px; }
.field input { width:100%; padding:10px 12px; background:#1a2236; border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:0.88rem; outline:none; }
.field input:focus { border-color:var(--accent); }
.btn { width:100%; padding:12px; background:var(--accent); color:#000; font-weight:700; font-size:0.88rem; border:none; border-radius:8px; cursor:pointer; margin-top:8px; }
.btn:hover { background:var(--accent-light); }
.err { color:var(--error); font-size:0.8rem; margin-top:8px; text-align:center; }
.footer { text-align:center; margin-top:22px; font-size:0.7rem; color:var(--muted); }
.footer a { color:var(--accent); text-decoration:none; }
</style>
</head>
<body>
<div class="login-box">
  <div class="brand">
    <h1>THE FLEX FACILITY</h1>
    <p>Sign in to your portal</p>
  </div>
  <form id="login-form">
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" required />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" required />
    </div>
    <div id="error-box"></div>
    <button class="btn" type="submit">Sign in →</button>
  </form>
  <div class="footer">Powered by <a href="https://goelev8.ai">GoElev8.AI</a></div>
</div>
<script>
document.getElementById('login-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  var errBox = document.getElementById('error-box');
  errBox.innerHTML = '';
  try {
    var res = await fetch('/api/auth?action=login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      })
    });
    var data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Login failed');
    localStorage.setItem('ge8_token', data.access_token);
    window.location.href = '/theflexfacility/bookings';
  } catch(err) {
    errBox.innerHTML = '<div class="err">' + err.message + '</div>';
  }
});
// If already authenticated, skip straight to bookings.
if (localStorage.getItem('ge8_token')) {
  window.location.replace('/theflexfacility/bookings');
}
</script>
</body>
</html>
