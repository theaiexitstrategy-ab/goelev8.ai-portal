<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Will Power Fitness Factory — Trainer Login</title>
<link rel="icon" href="/icon-192.png" />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --accent: #f2f2f2;
  --accent-dim: #b8b8b8;
  --bg: #0b0b0b;
  --card: #161616;
  --border: #2a2a2a;
  --text: #f3f4f6;
  --muted: #808080;
  --error: #ef4444;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Outfit',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; }
.login-box { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:40px; width:100%; max-width:400px; }
.brand { text-align:center; margin-bottom:28px; }
.brand h1 { font-family:'Bebas Neue',sans-serif; font-size:1.75rem; letter-spacing:0.06em; color:var(--accent); margin-bottom:6px; }
.brand p { color:var(--muted); font-size:0.875rem; letter-spacing:0.16em; text-transform:uppercase; font-family:'Barlow Condensed',sans-serif; }
.field { margin-bottom:16px; }
.field label { display:block; font-size:0.75rem; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; color:var(--muted); margin-bottom:6px; }
.field input { width:100%; padding:10px 12px; background:#1f1f1f; border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:0.875rem; outline:none; }
.field input:focus { border-color:var(--accent); }
.btn { width:100%; padding:12px; background:var(--accent); color:#000; font-weight:700; font-size:0.875rem; border:none; border-radius:8px; cursor:pointer; margin-top:8px; }
.btn:hover { background:var(--accent-dim); }
.err { color:var(--error); font-size:0.8rem; margin-top:8px; text-align:center; }
.footer { text-align:center; margin-top:24px; font-size:0.7rem; color:var(--muted); }
.footer a { color:var(--accent); text-decoration:none; }
</style>
</head>
<body>
<div class="login-box">
  <div class="brand">
    <h1>WILL POWER FITNESS FACTORY</h1>
    <p>Trainer Portal</p>
  </div>
  <form id="login-form">
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" required />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" required />
    </div>
    <div id="error-box"></div>
    <button class="btn" type="submit">Sign in →</button>
  </form>
  <div class="footer">Powered by <a href="https://goelev8.ai">GoElev8.AI</a></div>
</div>
<script>
document.getElementById('login-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  var errBox = document.getElementById('error-box');
  errBox.innerHTML = '';
  try {
    var res = await fetch('/api/auth?action=login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      })
    });
    var data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Login failed');
    localStorage.setItem('ge8_token', data.access_token);
    window.location.href = '/willpowerfitnessfactory/analytics';
  } catch(err) {
    errBox.innerHTML = '<div class="err">' + err.message + '</div>';
  }
});
if (localStorage.getItem('ge8_token')) {
  window.location.replace('/willpowerfitnessfactory/analytics');
}
</script>
</body>
</html>
