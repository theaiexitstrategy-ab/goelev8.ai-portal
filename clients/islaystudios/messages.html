<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>iSlay Studios — Messages</title>
<link rel="icon" href="/icon-192.png" />
<link rel="stylesheet" href="./portal.css?v=11" />
</head>
<body>
<button id="menu-toggle">&#9776;</button>
<div class="portal">
  <div id="sidebar"></div>
  <div class="main">
    <div class="topbar">
      <div>
        <h1>MESSAGES</h1>
        <div class="sub">SMS conversations with your leads</div>
      </div>
    </div>

    <div class="panel">
      <div id="messages-container">
        <div class="skeleton" style="height:400px"></div>
      </div>
    </div>
  </div>
</div>

<script src="./shell.js?v=11"></script>
<script>
initShell('messages');

var allContacts = [];
var activeContactId = null;
var allMessages = [];

function normPhone(p) {
  return (p || '').toString().replace(/\D/g, '').replace(/^1(?=\d{10}$)/, '');
}

async function loadContacts() {
  try {
    // Load contacts (the table messages.contact_id references) so threads
    // resolve. Load leads in parallel only to translate a ?lead_id= URL
    // param into a phone -> contact match for back-compat with the
    // "Send Message" button on the Leads page.
    var pairs = await Promise.all([
      api('/api/portal/crm?action=contacts'),
      api('/api/portal/leads').catch(function() { return { leads: [] }; })
    ]);
    var contactsData = pairs[0];
    var leadsData = pairs[1];
    allContacts = (contactsData.contacts || []).filter(function(c) { return c.phone; });
    renderContactList();

    // Check URL for pre-selected lead → resolve to contact by phone match.
    var params = new URLSearchParams(window.location.search);
    var leadIdParam = params.get('lead_id');
    if (leadIdParam) {
      var lead = (leadsData.leads || []).find(function(l) { return l.id === leadIdParam; });
      if (lead && lead.phone) {
        var key = normPhone(lead.phone);
        var match = allContacts.find(function(c) { return normPhone(c.phone) === key; });
        if (match) selectContact(match.id);
      }
    }
  } catch (err) {
    document.getElementById('messages-container').innerHTML =
      '<div class="empty">Failed to load contacts.</div>';
  }
}

function renderContactList() {
  if (!allContacts.length) {
    document.getElementById('messages-container').innerHTML =
      '<div class="empty">' +
        '<div style="font-size:2rem;margin-bottom:12px">💬</div>' +
        '<div style="font-size:0.95rem;margin-bottom:4px">No contacts with phone numbers yet.</div>' +
        '<div style="color:var(--muted);font-size:0.8rem">Leads with phone numbers will appear here for messaging.</div>' +
      '</div>';
    return;
  }

  var contactListHtml = allContacts.map(function(c) {
    var activeCls = c.id === activeContactId ? ' msg-contact active' : 'msg-contact';
    return '<div class="' + activeCls + '" onclick="selectContact(\'' + c.id + '\')">' +
      '<div class="msg-contact-name">' + (c.name || c.full_name || 'Unknown') + '</div>' +
      '<div class="msg-contact-phone">' + (c.phone || '') + '</div>' +
    '</div>';
  }).join('');

  var conversationHtml = activeContactId
    ? '<div id="msg-thread"><div class="skeleton" style="height:200px"></div></div>' +
      '<div class="msg-compose">' +
        '<textarea id="msg-input" rows="2" placeholder="Type a message..." maxlength="160"></textarea>' +
        '<div class="msg-compose-bar">' +
          '<span id="msg-char-count" class="msg-char-count">0/160</span>' +
          '<button class="btn btn-primary btn-sm" onclick="sendMessage()">Send</button>' +
        '</div>' +
      '</div>'
    : '<div class="empty" style="padding:80px 20px"><div style="color:var(--muted);font-size:0.85rem">Select a contact to view messages</div></div>';

  document.getElementById('messages-container').innerHTML =
    '<div class="msg-layout">' +
      '<div class="msg-sidebar">' +
        '<div class="msg-search"><input type="text" placeholder="Search contacts..." oninput="filterContacts(this.value)" /></div>' +
        '<div class="msg-contact-list">' + contactListHtml + '</div>' +
      '</div>' +
      '<div class="msg-conversation">' + conversationHtml + '</div>' +
    '</div>';

  if (activeContactId) loadThread(activeContactId);
}

function filterContacts(query) {
  var q = query.toLowerCase();
  var items = document.querySelectorAll('.msg-contact');
  items.forEach(function(el) {
    var name = el.querySelector('.msg-contact-name').textContent.toLowerCase();
    el.style.display = name.indexOf(q) >= 0 ? '' : 'none';
  });
}

function selectContact(id) {
  activeContactId = id;
  renderContactList();
}

async function loadThread(contactId) {
  var thread = document.getElementById('msg-thread');
  if (!thread) return;
  try {
    var data = await api('/api/portal/messages?contact_id=' + contactId);
    allMessages = data.messages || [];
    renderThread(thread);
  } catch (err) {
    thread.innerHTML = '<div class="empty">Failed to load messages.</div>';
  }
}

function renderThread(container) {
  if (!allMessages.length) {
    container.innerHTML = '<div class="empty" style="padding:40px"><div style="color:var(--muted);font-size:0.8rem">No messages yet. Send the first one below.</div></div>';
    return;
  }
  var html = allMessages.slice().reverse().map(function(m) {
    var cls = m.direction === 'outbound' ? 'msg-bubble outbound' : 'msg-bubble inbound';
    return '<div class="' + cls + '">' +
      '<div class="msg-body">' + (m.body || '') + '</div>' +
      '<div class="msg-time">' + formatDateTime(m.created_at) + '</div>' +
    '</div>';
  }).join('');
  container.innerHTML = '<div class="msg-thread-inner">' + html + '</div>';
  container.scrollTop = container.scrollHeight;
}

async function sendMessage() {
  var input = document.getElementById('msg-input');
  var text = input.value.trim();
  if (!text || !activeContactId) return;

  try {
    await api('/api/portal/messages', {
      method: 'POST',
      body: { contact_id: activeContactId, body: text }
    });
    input.value = '';
    updateCharCount();
    toast('Message sent');
    loadThread(activeContactId);
  } catch (err) {
    toast(err.message, true);
  }
}

function updateCharCount() {
  var input = document.getElementById('msg-input');
  var counter = document.getElementById('msg-char-count');
  if (!input || !counter) return;
  var len = input.value.length;
  counter.textContent = len + '/160';
  counter.className = 'msg-char-count' + (len > 150 ? ' red' : len > 130 ? ' amber' : '');
}

// Attach char counter
document.addEventListener('input', function(e) {
  if (e.target.id === 'msg-input') updateCharCount();
});

loadContacts();
</script>
<style>
.msg-layout { display:flex; min-height:500px; border:1px solid var(--border); border-radius:12px; overflow:hidden; background:var(--card); }
.msg-sidebar { width:260px; border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; }
.msg-search { padding:12px; border-bottom:1px solid var(--border); }
.msg-search input { width:100%; padding:8px 12px; background:#1a2236; border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:0.8rem; outline:none; font-family:var(--font-body); }
.msg-search input:focus { border-color:var(--gold); }
.msg-contact-list { flex:1; overflow-y:auto; }
.msg-contact { padding:12px 16px; border-bottom:1px solid rgba(255,255,255,0.04); cursor:pointer; transition:background 0.15s; }
.msg-contact:hover { background:rgba(255,255,255,0.03); }
.msg-contact.active { background:rgba(201,168,76,0.1); border-left:3px solid var(--gold); }
.msg-contact-name { font-size:0.85rem; font-weight:600; color:var(--text); }
.msg-contact-phone { font-size:0.75rem; color:var(--muted); margin-top:2px; }
.msg-conversation { flex:1; display:flex; flex-direction:column; }
#msg-thread { flex:1; overflow-y:auto; padding:16px; max-height:400px; }
.msg-thread-inner { display:flex; flex-direction:column; gap:8px; }
.msg-bubble { max-width:75%; padding:10px 14px; border-radius:12px; font-size:0.8rem; line-height:1.4; }
.msg-bubble.outbound { background:rgba(201,168,76,0.15); color:var(--text); align-self:flex-end; border-bottom-right-radius:4px; }
.msg-bubble.inbound { background:rgba(255,255,255,0.06); color:var(--text); align-self:flex-start; border-bottom-left-radius:4px; }
.msg-body { word-break:break-word; }
.msg-time { font-size:0.65rem; color:var(--muted); margin-top:4px; }
.msg-compose { padding:12px 16px; border-top:1px solid var(--border); }
.msg-compose textarea { width:100%; padding:8px 12px; background:#1a2236; border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:0.8rem; outline:none; resize:none; font-family:var(--font-body); }
.msg-compose textarea:focus { border-color:var(--gold); }
.msg-compose-bar { display:flex; justify-content:space-between; align-items:center; margin-top:8px; }
.msg-char-count { font-size:0.7rem; color:var(--muted); }
.msg-char-count.amber { color:var(--warn); }
.msg-char-count.red { color:var(--error); }
@media (max-width: 768px) {
  .msg-sidebar { width:100%; max-height:200px; border-right:none; border-bottom:1px solid var(--border); }
  .msg-layout { flex-direction:column; }
}
</style>
<style>
#mnav{display:none}
@media(max-width:768px){
  #mnav{display:flex!important}
  .main{padding-bottom:80px!important}
  #sidebar{display:none!important}
  #menu-toggle{display:none!important}
}
@media(min-width:769px){#mnav{display:none!important}}
#pwa-ios{display:none}
@media(max-width:768px){#pwa-ios{display:flex}}
</style>
<nav id="mnav" style="position:fixed;bottom:0;left:0;right:0;background:#0d1117;border-top:1px solid #1f2937;z-index:200;padding:8px 0 max(8px,env(safe-area-inset-bottom));justify-content:space-around;align-items:center">
<a href="/islaystudios/leads" style="display:flex;flex-direction:column;align-items:center;gap:2px;text-decoration:none;color:#9ca3af;font-size:0.6rem;font-family:sans-serif;padding:4px 8px"><span style="font-size:1.2rem">👥</span>Leads</a>
<a href="/islaystudios/messages" style="display:flex;flex-direction:column;align-items:center;gap:2px;text-decoration:none;color:#C9A84C;font-size:0.6rem;font-family:sans-serif;padding:4px 8px"><span style="font-size:1.2rem">💬</span>Messages</a>
<a href="/islaystudios/blasts" style="display:flex;flex-direction:column;align-items:center;gap:2px;text-decoration:none;color:#9ca3af;font-size:0.6rem;font-family:sans-serif;padding:4px 8px"><span style="font-size:1.2rem">📣</span>Blasts</a>
<a href="/islaystudios/nudges" style="display:flex;flex-direction:column;align-items:center;gap:2px;text-decoration:none;color:#9ca3af;font-size:0.6rem;font-family:sans-serif;padding:4px 8px"><span style="font-size:1.2rem">⚡</span>Nudges</a>
<a href="/islaystudios/settings" style="display:flex;flex-direction:column;align-items:center;gap:2px;text-decoration:none;color:#9ca3af;font-size:0.6rem;font-family:sans-serif;padding:4px 8px"><span style="font-size:1.2rem">⚙️</span>Settings</a>
</nav>
<div id="pwa-ios" style="position:fixed;bottom:62px;left:12px;right:12px;background:#111827;border:1px solid #C9A84C;border-radius:12px;padding:14px 16px;align-items:center;gap:12px;z-index:199;box-shadow:0 4px 20px rgba(0,0,0,0.4)">
<div style="flex:1;font-size:0.8rem;line-height:1.4;color:#f3f4f6"><strong style="color:#C9A84C">Add to Home Screen</strong><br>Tap the share button ⎙ then <b>Add to Home Screen</b></div>
<button onclick="this.parentElement.style.display='none'" style="background:none;border:none;color:#9ca3af;font-size:1.2rem;cursor:pointer;padding:4px">✕</button>
</div>
</body>
</html>
