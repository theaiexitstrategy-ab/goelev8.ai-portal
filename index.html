<div id="app"></div>
<script>
// Force-clear stale service worker caches on every load
(function(){
  var APP_VERSION = 13;
  var vKey = 'ge8_app_v';
  var lastV = parseInt(localStorage.getItem(vKey) || '0', 10);
  if (lastV < APP_VERSION) {
    localStorage.setItem(vKey, String(APP_VERSION));
    // Nuke all caches
    if ('caches' in window) {
      caches.keys().then(function(names) {
        names.forEach(function(n) { caches.delete(n); });
      });
    }
    // Unregister all service workers
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        regs.forEach(function(r) { r.unregister(); });
      });
    }
    // Hard reload to fetch fresh everything
    if (lastV > 0) { window.location.reload(true); return; }
  }
})();
// Client routing: redirect /islaystudios to the iSlay portal
(function() {
  var path = window.location.pathname;
  if (path.startsWith('/islaystudios')) {
    var token = localStorage.getItem('ge8_token');
    if (!token && path !== '/islaystudios/login') {
      window.location.replace('/islaystudios/login');
      return;
    }
    // If authenticated and on bare /islaystudios, go to leads
    if (token && (path === '/islaystudios' || path === '/islaystudios/')) {
      window.location.replace('/islaystudios/leads');
      return;
    }
  }
})();
</script>
